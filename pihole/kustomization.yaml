apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pihole

resources:
  - deployment.yaml
  - svc.yaml
  - pvc.yaml

images:
  # https://github.com/pi-hole/docker-pi-hole/releases
  - name: pihole/pihole
    newTag: 2026.02.0

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: pihole-env
    literals:
      - TZ=Europe/Prague
      - FTLCONF_webserver_api_password=""
      - FTLCONF_dns_dnssec=false
      - FTLCONF_dns_upstreams=knot-resolver.knot-resolver.svc.cluster.local#5335  # knot-resolver ClusterIP service
  - name: pihole-whitelist-configuration
    files:
      - conf/whitelist.txt
