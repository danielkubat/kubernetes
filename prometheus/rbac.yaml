apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: prometheus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-monitor-role
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-monitor-binding
subjects:
- kind: ServiceAccount
  name: prometheus
  namespace: prometheus
roleRef:
  kind: ClusterRole
  name: prometheus-monitor-role
  apiGroup: rbac.authorization.k8s.io
